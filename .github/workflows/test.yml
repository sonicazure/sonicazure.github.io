name: Test & Lint

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: 🔍 测试与检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔎 ESLint 检查
        run: npm run lint
        continue-on-error: true

      - name: 🔨 TypeScript 编译检查
        run: npx tsc --noEmit

      - name: 📦 构建测试
        run: npm run build

      - name: 📊 构建结果统计
        run: |
          echo "📁 dist 目录大小:"
          du -sh dist/ 2>/dev/null || echo "dist 目录未生成"
          echo ""
          echo "📄 主要文件:"
          ls -lh dist/assets/ 2>/dev/null | head -10 || echo "无 assets 目录"
